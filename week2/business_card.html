<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zero to Hero</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      font-family: monospace;
      color: #e0e0e0;
    }
    .card {
      border: 1px solid #333;
      border-radius: 12px;
      padding: 48px 64px;
      text-align: center;
      background: #1a1a1a;
    }
    .business { font-size: 2rem; font-weight: bold; color: #ffffff; margin-bottom: 8px; }
    .tagline { font-size: 1rem; font-style: italic; color: #bbb; margin-bottom: 12px; }
    .name { font-size: 1rem; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="business">Zero to Hero</div>
    <div class="tagline">Teach people how to use Claude</div>
    <div class="name">Marcos</div>
  </div>
</body>
</html>
